default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL") %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", ENV.fetch("DATABASE_URL")) %>

production:
  primary: &primary_production
    <<: *default
  cache:
    <<: *primary_production
    database: postgrest_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: postgrest_production_queue
    migrations_paths: db/queue_migrate
