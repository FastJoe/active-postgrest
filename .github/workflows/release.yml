name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install signing key
        run: |
          mkdir -p ~/.gem
          echo "${{ secrets.GEM_SIGNING_KEY }}" | base64 --decode > ~/.gem/gem-private_key.pem
          chmod 600 ~/.gem/gem-private_key.pem

      - name: Build gem
        run: gem build active_postgrest.gemspec

      - name: Publish to RubyGems
        run: gem push *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
